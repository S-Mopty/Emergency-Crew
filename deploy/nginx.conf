server {
    listen 80;
    server_name emergencycrew.synn.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name emergencycrew.synn.fr;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/emergencycrew.synn.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emergencycrew.synn.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Proxy to Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
